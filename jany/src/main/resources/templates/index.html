<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AdminLTE 3 | Dashboard</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
<link rel="stylesheet" href="plugins/fontawesome-free/css/all.min.css">
<link rel="stylesheet" href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css">
<link rel="stylesheet" href="plugins/tempusdominus-bootstrap-4/css/tempusdominus-bootstrap-4.min.css">
<link rel="stylesheet" href="plugins/icheck-bootstrap/icheck-bootstrap.min.css">
<link rel="stylesheet" href="plugins/jqvmap/jqvmap.min.css">
<link rel="stylesheet" href="dist/css/adminlte.min.css">
<link rel="stylesheet" href="plugins/overlayScrollbars/css/OverlayScrollbars.min.css">
<link rel="stylesheet" href="plugins/daterangepicker/daterangepicker.css">
<link rel="stylesheet" href="plugins/summernote/summernote-bs4.min.css">
</head>

<body class="hold-transition sidebar-mini layout-fixed">

<div class="wrapper">

    <!-- PRELOADER -->
    <div class="preloader flex-column justify-content-center align-items-center">
        <img src="dist/img/AdminLTELogo.png"
             class="animation__shake"
             alt="AdminLTELogo"
             width="60"
             height="60">
    </div>

    <!-- SIDEBAR -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">

        <a href="index3.html" class="brand-link">
            <img src="dist/img/AdminLTELogo.png"
                 class="brand-image img-circle elevation-3"
                 style="opacity:.8"
                 alt="AdminLTE Logo">
            <span class="brand-text font-weight-light">
                Desarrollo
            </span>
        </a>

        <div class="sidebar">

            <div class="user-panel mt-3 pb-3 mb-3 d-flex">
                <div class="image">
                    <img src="dist/img/user2-160x160.jpg"
                         class="img-circle elevation-2"
                         alt="User Image">
                </div>

                <div class="info">
                    <a href="#" class="d-block" th:text="${usuario}">
                        Usuario
                    </a>
                </div>
            </div>

            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column"
                    data-widget="treeview"
                    role="menu"
                    data-accordion="false">

                    <li class="nav-item">
                        <a class="nav-link" href="pages/widgets.html">
                            <i class="nav-icon fas fa-home"></i>
                            <p>Home</p>
                        </a>
                    </li>

                    <li class="nav-header">LABELS</li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="nav-icon far fa-circle text-danger"></i>
                            <p class="text">Important</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="nav-icon far fa-circle text-warning"></i>
                            <p>Warning</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="nav-icon far fa-circle text-info"></i>
                            <p>Informational</p>
                        </a>
                    </li>

                </ul>
            </nav>

        </div>
    </aside>

    <!-- CONTENT -->
    <div class="content-wrapper">

        <section class="content">
            <div class="container-fluid">

				<div class="row">

				    <!-- ORDERS -->
				    <div class="col-lg-3 col-md-6 col-sm-6 col-12">
				        <div class="small-box bg-info">
				            <div class="inner">
				                <h3 th:text="${#lists.size(lista)}"></h3>
				                <p>Orders</p>
				            </div>
				            <div class="icon">
				                <i class="ion ion-bag"></i>
				            </div>
				            <a class="small-box-footer"
				               data-toggle="collapse"
				               href="#dropOrders">
				                More info <i class="fas fa-chevron-down"></i>
				            </a>
				        </div>

				        <div id="dropOrders" class="collapse">
				            <div class="card card-body p-2">
				                <ul class="mb-0">
				                    <li th:each="o : ${lista}"
				                        th:text="${o}"></li>
				                </ul>
				            </div>
				        </div>
				    </div>


				    <!-- USERS -->
				    <div class="col-lg-3 col-md-6 col-sm-6 col-12">
				        <div class="small-box bg-warning">
				            <div class="inner">
				                <h3 th:text="${#lists.size(listaU)}"></h3>
				                <p>Users</p>
				            </div>
				            <div class="icon">
				                <i class="ion ion-person-add"></i>
				            </div>
				            <a class="small-box-footer"
				               data-toggle="collapse"
				               href="#dropUsers">
				                More info <i class="fas fa-chevron-down"></i>
				            </a>
				        </div>

				        <div id="dropUsers" class="collapse">
				            <div class="card card-body p-2">
				                <ul class="mb-0">
				                    <li th:each="u : ${listaU}"
				                        th:text="${u}"></li>
				                </ul>
				            </div>
				        </div>
				    </div>


				    <!-- MATERIAS -->
				    <div class="col-lg-3 col-md-6 col-sm-6 col-12">
				        <div class="small-box bg-success">
				            <div class="inner">
				                <h3 th:text="${#lists.size(listaN)}"></h3>
				                <p>Materias</p>
				            </div>
				            <div class="icon">
				                <i class="ion ion-book"></i>
				            </div>
				            <a class="small-box-footer"
				               data-toggle="collapse"
				               href="#dropMaterias">
				                More info <i class="fas fa-chevron-down"></i>
				            </a>
				        </div>

				        <div id="dropMaterias" class="collapse">
				            <div class="card card-body p-2">
				                <ul class="mb-0">
				                    <li th:each="m : ${listaN}"
				                        th:text="${m}"></li>
				                </ul>
				            </div>
				        </div>
				    </div>


				    <!-- BOUNCE -->
				    <div class="col-lg-3 col-md-6 col-sm-6 col-12">
				        <div class="small-box bg-danger">
				            <div class="inner">
				                <h3 th:text="${bouncePorcentaje + '%'}"></h3>
				                <p>Bounce Rate</p>
				            </div>
				            <div class="icon">
				                <i class="ion ion-stats-bars"></i>
				            </div>
				            <a class="small-box-footer"
				               data-toggle="collapse"
				               href="#dropBounce">
				                More info <i class="fas fa-chevron-down"></i>
				            </a>
				        </div>

				        <div id="dropBounce" class="collapse">
				            <div class="card card-body p-2">
				                <ul class="mb-0">
				                    <li th:each="b : ${bounce}"
				                        th:text="${b}"></li>
				                </ul>
				            </div>
				        </div>
				    </div>

				</div>
			
        </section>

    </div>

    <footer class="main-footer">
        <strong>
            Copyright ©️ 2014-2021
            <a href="https://adminlte.io">AdminLTE.io</a>.
        </strong>
        All rights reserved.
        <div class="float-right d-none d-sm-inline-block">
            <b>Version</b> 3.1.0
        </div>
    </footer>

</div>

<script src="plugins/jquery/jquery.min.js"></script>
<script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="dist/js/adminlte.js"></script>

</body>
</html>
